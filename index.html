<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Fantasy 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#06060e;--s1:#0c0c1a;--s2:#121228;--s3:#1a1a38;--border:#1e1e42;--text:#f0f0ff;--muted:#5a5a8a;--fd:'Teko',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 120% 60% at 15% 5%,rgba(99,102,241,0.12) 0%,transparent 55%),radial-gradient(ellipse 80% 50% at 85% 95%,rgba(236,72,153,0.1) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 50% 50%,rgba(245,197,24,0.04) 0%,transparent 60%);pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1480px;margin:0 auto;padding:0 20px 80px}

/* HERO */
.hero{position:relative;padding:36px 0 28px;margin-bottom:0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.hero-left{display:flex;align-items:center;gap:18px}
.trophy-wrap{position:relative;flex-shrink:0}
.trophy-glow{position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(245,197,24,0.35),transparent 70%);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.hero-title{font-family:var(--fd);font-size:52px;letter-spacing:4px;line-height:1;background:linear-gradient(135deg,#f5c518 0%,#ff6b35 50%,#ec4899 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-family:var(--fm);font-size:10px;letter-spacing:5px;color:var(--muted);margin-top:4px;text-transform:uppercase}
.hero-right{display:flex;flex-wrap:wrap;gap:6px;max-width:580px}
.mpill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-family:var(--fm);font-size:10px;color:var(--muted);white-space:nowrap}
.mpill .d{width:5px;height:5px;border-radius:50%;background:#00e676;box-shadow:0 0 6px #00e676}

/* TEAM BAR */
.teams-bar{display:flex;align-items:center;justify-content:space-between;gap:4px;padding:14px 20px;margin:20px 0 28px;background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow-x:auto}
.teams-bar::-webkit-scrollbar{height:3px}.teams-bar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tl{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:default;transition:transform .2s;padding:0 4px}
.tl:hover{transform:translateY(-3px)}
.tl-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid;font-family:var(--fd);font-size:11.5px;font-weight:600;transition:all .2s;letter-spacing:.5px}
.tl:hover .tl-circle{box-shadow:0 0 16px currentColor}
.tl-name{font-family:var(--fm);font-size:8px;letter-spacing:1px}

/* LEADERBOARD */
.sec-hd{font-family:var(--fm);font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.lb-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:32px}
@media(max-width:860px){.lb-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:520px){.lb-row{grid-template-columns:repeat(2,1fr)}}

.lb-card{position:relative;border-radius:16px;padding:22px 16px 18px;text-align:center;cursor:pointer;overflow:hidden;transition:transform .25s,box-shadow .25s}
.lb-card::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background:var(--cg);pointer-events:none}
.lb-card:hover{transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,0,0,.5)}
.lb-card.r1{background:linear-gradient(160deg,#1a1200,#0d0d00);--cg:linear-gradient(135deg,#f5c518,#ff6b35)}
.lb-card.r2{background:linear-gradient(160deg,#151520,#0d0d18);--cg:linear-gradient(135deg,#c0c0d0,#808090)}
.lb-card.r3{background:linear-gradient(160deg,#130b00,#0c0800);--cg:linear-gradient(135deg,#cd7f32,#8b5a1a)}
.lb-card.r4,.lb-card.r5{background:var(--s1);--cg:var(--border)}
.lb-medal{font-size:28px;margin-bottom:6px;line-height:1;display:block}
.lb-rank{font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:4px}
.lb-name{font-family:var(--fd);font-size:30px;letter-spacing:1px;line-height:1;margin-bottom:8px}
.lb-pts{font-family:var(--fd);font-size:42px;line-height:1;background:var(--pg,linear-gradient(135deg,#f5c518,#ff6b35));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lb-card.r2 .lb-pts{--pg:linear-gradient(135deg,#d0d0e0,#9090a8)}
.lb-card.r3 .lb-pts{--pg:linear-gradient(135deg,#cd7f32,#e8a44a)}
.lb-card.r4 .lb-pts,.lb-card.r5 .lb-pts{--pg:linear-gradient(135deg,#6060a0,#4040a0)}
.lb-label{font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.lb-bars{display:flex;gap:3px;justify-content:center;align-items:flex-end;height:22px;margin-top:10px}
.lb-bar{width:9px;border-radius:2px 2px 0 0;min-height:2px}

/* ACTIONS */
.actions{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:10px;border:none;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-xl{background:linear-gradient(135deg,#00e676,#00c853);color:#000}
.btn-xl:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,230,118,.3)}
.vtog{display:flex;gap:3px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:3px;margin-left:auto}
.vbtn{padding:6px 16px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.vbtn.on{background:var(--s3);color:var(--text)}

/* OWNER BLOCK */
.owner-block{margin-bottom:20px;border-radius:18px;overflow:hidden;border:1px solid var(--border);transition:border-color .2s}
.owner-block:hover{border-color:rgba(255,255,255,.08)}
.owner-hd{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;user-select:none;transition:background .2s;position:relative;background:var(--s1)}
.owner-hd:hover{background:var(--s2)}
.owner-hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--border)}
.oav{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:22px;font-weight:700}
.oinfo{flex:1}
.oname{font-family:var(--fd);font-size:24px;letter-spacing:1px;line-height:1}
.ometa{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px}
.opts{font-family:var(--fd);font-size:28px;background:linear-gradient(135deg,#f5c518,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.obadge{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px}
.b1{background:rgba(245,197,24,.15);color:#f5c518;border:1px solid rgba(245,197,24,.4)}
.b2{background:rgba(192,192,192,.1);color:#c0c0c0;border:1px solid rgba(192,192,192,.3)}
.b3{background:rgba(205,127,50,.1);color:#cd7f32;border:1px solid rgba(205,127,50,.3)}
.b4,.b5{background:var(--s3);color:var(--muted);border:1px solid var(--border)}
.chev{color:var(--muted);font-size:11px;transition:transform .3s;margin-left:6px}
.chev.o{transform:rotate(180deg)}

/* PLAYER GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:1px;background:var(--border)}
.pcard{background:var(--s1);padding:18px 10px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;transition:background .2s;cursor:default;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--tc,#444);opacity:0;transition:opacity .2s}
.pcard:hover{background:var(--s2)}
.pcard:hover::before{opacity:1}
.pimg{width:72px;height:72px;border-radius:50%;overflow:hidden;border:2.5px solid var(--tc,#333);background:var(--s3);flex-shrink:0;position:relative;transition:box-shadow .3s}
.pcard:hover .pimg{box-shadow:0 0 0 3px var(--tc,#333),0 0 20px rgba(255,255,255,.08)}
.pimg img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.pimg .fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:24px;color:var(--muted);background:var(--s3)}
.pname{font-size:12px;font-weight:600;text-align:center;line-height:1.3;color:var(--text)}
.ptbadge{font-family:var(--fm);font-size:9px;font-weight:600;padding:2px 9px;border-radius:10px;border:1px solid var(--tc,#333);color:var(--tc,#888);background:rgba(255,255,255,.04);letter-spacing:.3px}
.ptotal{font-family:var(--fd);font-size:22px;line-height:1;background:linear-gradient(135deg,#f5c518,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ptotal.z{-webkit-text-fill-color:var(--muted);background:none;font-size:18px}
.mdots{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}
.mdot{font-family:var(--fm);font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(0,230,118,.1);color:#00e676;border:1px solid rgba(0,230,118,.2)}
.mdot.z{background:rgba(255,255,255,.03);color:var(--muted);border-color:transparent}

/* TABLE */
.ptable{width:100%;border-collapse:collapse;display:none}
.ptable th{padding:10px 16px;font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:var(--s2);border-bottom:1px solid var(--border);text-align:left}
.ptable td{padding:10px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
.ptable tr:last-child td{border-bottom:none}
.ptable tr:hover td{background:rgba(255,255,255,.02)}
.tcell{display:flex;align-items:center;gap:10px}
.timg{width:36px;height:36px;border-radius:50%;overflow:hidden;border:1.5px solid var(--border);background:var(--s3);flex-shrink:0}
.timg img{width:100%;height:100%;object-fit:cover;object-position:top}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

footer{text-align:center;padding:28px 0 0;border-top:1px solid var(--border);margin-top:40px;font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lb-card{animation:fadeUp .5s ease both}
.lb-card:nth-child(1){animation-delay:.05s}.lb-card:nth-child(2){animation-delay:.1s}
.lb-card:nth-child(3){animation-delay:.15s}.lb-card:nth-child(4){animation-delay:.2s}
.lb-card:nth-child(5){animation-delay:.25s}
</style>
</head>

<script>

// Wikipedia page titles for each player (Wikipedia API has CORS: * so works from any domain)
const WIKI_TITLES={
  "Virat Kohli":"Virat_Kohli","Rohit Sharma":"Rohit_Sharma","Jasprit Bumrah":"Jasprit_Bumrah",
  "Hardik Pandya":"Hardik_Pandya","Suryakumar Yadav":"Suryakumar_Yadav","Shubman Gill":"Shubman_Gill",

// Image cache - populated via Wikipedia API
// Build reverse map: "virat_kohli_(cricketer)" → "Virat Kohli"
const TITLE_TO_PLAYER={};
Object.entries(WIKI_TITLES).forEach(([p,t])=>TITLE_TO_PLAYER[t.toLowerCase()]=p);

const IMG_CACHE={};

async function fetchAllImages(){
  const players=Object.keys(WIKI_TITLES);
  const batchSize=20;
  for(let i=0;i<players.length;i+=batchSize){
    const batch=players.slice(i,i+batchSize);
    // build title→player lookup for this batch
    const t2p={};
    batch.forEach(p=>{t2p[WIKI_TITLES[p]]=p; t2p[WIKI_TITLES[p].replace(/_/g,' ')]=p;});
    const titles=batch.map(p=>WIKI_TITLES[p]).join('|');
    try{
      const url=`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles)}&prop=pageimages&format=json&pithumbsize=150&origin=*`;
      const r=await fetch(url);const d=await r.json();
      // Handle redirects/normalizations
      const norm={};
      (d.query?.normalized||[]).forEach(n=>{norm[n.to]=n.from;norm[n.to.replace(/ /g,'_')]=n.from});
      (d.query?.redirects||[]).forEach(n=>{norm[n.to]=n.from;norm[n.to.replace(/ /g,'_')]=n.from});
      Object.values(d.query?.pages||{}).forEach(page=>{
        if(!page.thumbnail?.source) return;
        const ptitle=page.title; // "Virat Kohli"
        const punder=ptitle.replace(/ /g,'_'); // "Virat_Kohli"
        // Try direct title match first
        let player=t2p[ptitle]||t2p[punder];
        // Try via normalization chain
        if(!player){const orig=norm[ptitle]||norm[punder];if(orig)player=t2p[orig]||t2p[orig.replace(/ /g,'_')];}
        // Fallback: match by first word of title (catches "(cricketer)" variants)
        if(!player){const fw=punder.split('_')[0].toLowerCase();const found=batch.find(p=>p.split(' ')[0].toLowerCase()===fw&&!IMG_CACHE[p]);if(found)player=found;}
        if(player) IMG_CACHE[player]=page.thumbnail.source;
      });
    }catch(e){}
  }
  renderOwners();
}

const OC={
  "Vivek":{bg:"linear-gradient(135deg,#f5c518,#ff6b35)",fg:"#000"},
  "Vedant":{bg:"linear-gradient(135deg,#6366f1,#ec4899)",fg:"#fff"},

};

const tot=n=>(PTS[n]||[]).reduce((s,v)=>s+v,0);
const oTot=o=>DRAFT[o].reduce((s,p)=>s+tot(p.p),0);
const ini=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

let view='cards';
const col={};

function renderTeamBar(){
  document.getElementById('teamBar').innerHTML=Object.entries(T).map(([,t])=>`
    <div class="tl">
      <div class="tl-circle" style="border-color:${t.c};color:${t.c};background:${t.cl}">${t.a}</div>
      <span class="tl-name" style="color:${t.c}">${t.a}</span>
    </div>`).join('');
}

function renderLB(){
  const medals=['🥇','🥈','🥉','',''];
  const sorted=Object.keys(DRAFT).map(o=>({o,total:oTot(o),mp:MATCHES.map((_,i)=>DRAFT[o].reduce((s,p)=>s+((PTS[p.p]||[])[i]||0),0))})).sort((a,b)=>b.total-a.total);
  const maxMP=Math.max(...sorted.flatMap(r=>r.mp),1);
  const mc=['#f5c518','#ff6b35','#ec4899','#6366f1'];
  document.getElementById('lb').innerHTML=sorted.map((r,i)=>{
    const bars=r.mp.map((v,mi)=>{const h=Math.max(2,Math.round((v/maxMP)*18));return`<div class="lb-bar" style="height:${h}px;background:${mc[mi]};opacity:${v>0?.8:.15}"></div>`}).join('');
    return`<div class="lb-card r${i+1}" onclick="goTo('${r.o}')"><span class="lb-medal">${medals[i]||''}</span><div class="lb-rank">#${i+1} PLACE</div><div class="lb-name">${r.o}</div><div class="lb-pts">${r.total}</div><div class="lb-label">POINTS</div><div class="lb-bars">${bars}</div></div>`;
  }).join('');
}

function goTo(o){document.getElementById('blk-'+o)?.scrollIntoView({behavior:'smooth',block:'start'})}

function pCard(pl){
  const pts=PTS[pl.p]||[],total=pts.reduce((s,v)=>s+v,0),tc=T[pl.t],u=img(pl.p);
  const dots=MATCHES.map((m,i)=>{const v=pts[i]||0;return v>0?`<span class="mdot">${m}:${v}</span>`:''}).join('');
  return`<div class="pcard" style="--tc:${tc?.c||'#444'}">
    <div class="pimg">
      ${u?`<img src="${u}" alt="${pl.p}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="fb" style="display:none">${ini(pl.p)}</div>`:`<div class="fb">${ini(pl.p)}</div>`}
    </div>
    <div class="pname">${pl.p}</div>
    <div class="ptbadge">${tc?.a||pl.t}</div>
    <div class="ptotal${total===0?' z':''}">${total>0?total:'—'}</div>
    <div class="mdots">${dots}</div>
  </div>`;
}

function pRow(pl){
  const pts=PTS[pl.p]||[],total=pts.reduce((s,v)=>s+v,0),tc=T[pl.t],u=img(pl.p);
  const cells=MATCHES.map((_,i)=>{const v=pts[i]||0;return`<td style="font-family:var(--fm);font-size:13px;color:${v>0?'#00e676':'var(--muted)'}">${v||'—'}</td>`}).join('');
  return`<tr><td><div class="tcell"><div class="timg">${u?`<img src="${u}" alt="${pl.p}" loading="lazy" onerror="this.style.display='none'">`:''}</div><span style="font-size:13px;font-weight:500">${pl.p}</span></div></td><td><span style="font-family:var(--fm);font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid ${tc?.c||'#444'};color:${tc?.c||'#888'}">${tc?.a||pl.t}</span></td>${cells}<td style="font-family:var(--fd);font-size:18px;${total>0?'background:linear-gradient(135deg,#f5c518,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent':'color:var(--muted)'}">${total||'—'}</td></tr>`;
}

function renderOwners(){
  const sorted=Object.keys(DRAFT).map(o=>({o,t:oTot(o)})).sort((a,b)=>b.t-a.t);
  const rm={};sorted.forEach((r,i)=>rm[r.o]=i+1);
  document.getElementById('owners').innerHTML=Object.keys(DRAFT).map(owner=>{
    const total=oTot(owner),rank=rm[owner],oc=OC[owner],isOpen=!col[owner];
    const bc=['','b1','b2','b3','b4','b5'][rank]||'b5';
    const gc=`<div class="pgrid">${DRAFT[owner].map(pCard).join('')}</div>`;
    const tc=`<table class="ptable"${view==='table'?' style="display:table"':''}><thead><tr><th>Player</th><th>Team</th>${MATCHES.map(m=>`<th>${m}</th>`).join('')}<th>Total</th></tr></thead><tbody>${DRAFT[owner].map(pRow).join('')}</tbody></table>`;
    return`<div class="owner-block" id="blk-${owner}">
      <div class="owner-hd" onclick="tog('${owner}')">
        <div class="oav" style="background:${oc.bg};color:${oc.fg}">${owner[0]}</div>
        <div class="oinfo"><div class="oname">${owner}</div><div class="ometa">${DRAFT[owner].length} players · Rank #${rank}</div></div>
        <div class="opts">${total}</div>
        <div class="obadge ${bc}">#${rank}</div>
        <span class="chev${isOpen?' o':''}">▼</span>
      </div>
      <div id="ct-${owner}" style="${isOpen?'':'display:none'}">${view==='cards'?gc:tc}</div>
    </div>`;
  }).join('');
}

function tog(o){
  col[o]=!col[o];
  const c=document.getElementById('ct-'+o),ch=document.querySelector(`#blk-${o} .chev`);
  if(col[o]){c.style.display='none';ch.classList.remove('o')}else{c.style.display='';ch.classList.add('o');renderOwners()}
}

function setView(v){
  view=v;
  document.getElementById('vc').className='vbtn'+(v==='cards'?' on':'');
  document.getElementById('vt').className='vbtn'+(v==='table'?' on':'');
  renderOwners();
}

function exportXL(){
  const wb=XLSX.utils.book_new(),owners=Object.keys(DRAFT);
  const hdr=[];owners.forEach(o=>hdr.push(o,'Team',...MLABELS,'Total'));
  const rows=[hdr];
  const ml=Math.max(...owners.map(o=>DRAFT[o].length));
  for(let i=0;i<ml;i++){const row=[];owners.forEach(o=>{const pl=DRAFT[o][i];if(pl){const p=PTS[pl.p]||[];row.push(pl.p,pl.t,...MATCHES.map((_,mi)=>p[mi]||0),p.reduce((s,v)=>s+v,0))}else row.push('','',...MATCHES.map(()=>''),'')});rows.push(row)}
  const tr=[];owners.forEach(o=>{const mp=MATCHES.map((_,mi)=>DRAFT[o].reduce((s,pl)=>s+((PTS[pl.p]||[])[mi]||0),0));tr.push('TOTAL','/',...mp,oTot(o))});rows.push(tr);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=Array(owners.length*(3+MATCHES.length)).fill(null).map((_,i)=>({wch:i%(3+MATCHES.length)===0?26:i%(3+MATCHES.length)===1?24:10}));
  XLSX.utils.book_append_sheet(wb,ws,'Fantasy Points');
  XLSX.writeFile(wb,`ipl_fantasy_2026_${new Date().toISOString().slice(0,10)}.xlsx`);
}
