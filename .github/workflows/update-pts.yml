name: Auto-Update IPL Fantasy Points

on:
  workflow_dispatch:
    inputs:
      gameday:
        description: "Gameday ID (e.g. 37)"
        required: true

jobs:
  update-pts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run PTS updater
        run: python update_pts.py --file index.html --gameday "${{ github.event.inputs.gameday }}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            GAMEDAY_LINE=$(grep 'const MATCHES' index.html | head -1)
            git commit -m "🏏 Auto-update IPL Fantasy points — ${GAMEDAY_LINE}"
            git push
          fi
